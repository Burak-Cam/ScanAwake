name: no_snooze
description: "Barcode Alarm App - No Snooze Allowed!"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  alarm: ^5.1.0
  file_picker: ^8.0.0  # <-- BURAYI DEĞİŞTİR (6.1.1 yerine 8.0.0 yap)
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/  # <-- Bu satır klasördeki her şeyi içeri alır