name: no_snooze
description: "Barcode Alarm App - No Snooze Allowed!"
publish_to: 'none'

version: 2.1.0+3

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  alarm: ^5.1.0
  # Imported directly in lib/main.dart for FGBG (foreground/background) escape
  # detection. Already resolved transitively via `alarm` at 0.7.1; declared
  # directly so flutter_lints 5.x `depend_on_referenced_packages` passes.
  flutter_fgbg: ^0.7.1
  file_picker: ^8.0.0  # custom ringtone file picking
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8
  audioplayers: ^6.0.0
  camera: ^0.12.0+1
  # MIS-03 (Phase 6): on-device ML Kit image labeling — label + confidence per
  # frame, bundled offline model (no Firebase, no network). Official
  # flutter-ml/google_ml_kit_flutter monorepo (pub.dev). Used by
  # lib/missions/object_mission.dart to recognize the requested household item.
  google_mlkit_image_labeling: ^0.14.2
  # Imported directly in lib/missions/object_mission.dart for InputImage /
  # InputImageMetadata (the CameraImage→InputImage conversion). Resolved
  # transitively via google_mlkit_image_labeling; declared directly so
  # flutter_lints 5.x `depend_on_referenced_packages` passes (flutter_fgbg precedent).
  google_mlkit_commons: ^0.11.0
  # MIS-03 (Phase 6 custom-model pivot): copy the bundled .tflite asset to an
  # app-support file path for LocalLabelerOptions(modelPath:). Resolved
  # transitively (alarm/file_picker) but imported directly in object_mission.dart,
  # so declared here for flutter_lints depend_on_referenced_packages.
  path_provider: ^2.1.5
  # MIS-04 (Phase 7): raw on-device TFLite inference over a bundled offline YAMNet
  # model (assets/ml/yamnet.tflite) — fully offline, no network, no Firebase.
  # Official tensorflow/flutter-tflite (pub.dev). Used by
  # lib/missions/water_mission.dart to classify the running-water sound. Requires
  # Android minSdk 26 (see android/app/build.gradle.kts).
  tflite_flutter: ^0.12.1
  # MIS-04 (Phase 7): 16kHz mono PCM16 mic stream feeding the YAMNet sliding
  # buffer. Official llfbandit/record (pub.dev). Pinned to 6.x (6.1.1 floor): the
  # 7.x line was not cleared for this device/flow at plan-time, so we keep the 6.x
  # API surface (startStream + RecordConfig). Used by water_mission.dart.
  record: ^6.1.1
  vibration: ^3.2.0
  # First-launch onboarding coach-marks (spotlight + arrow + tooltip). Used by
  # home_screen.dart to introduce barcode/streak/token/add-alarm on first run.
  showcaseview: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4
  # BRAND-IN-APP: build-time codegen for the native splash (brand logo on the
  # dark brand background). Dev-only, not shipped in the APK.
  flutter_native_splash: ^2.4.0

# App launcher icon (ScanAwake brand). Source art lives in design/export/.
# adaptive_icon_foreground_inset pushes the corner-bracket frame into the
# adaptive safe zone so it survives Android's circular/squircle masks; the
# adaptive background matches the icon's dark so the inset margin is seamless.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "design/export/icon-1024.png"
  min_sdk_android: 26
  remove_alpha_ios: true
  adaptive_icon_background: "#16130F"
  adaptive_icon_foreground: "design/export/icon-1024.png"
  adaptive_icon_foreground_inset: 20

# BRAND-IN-APP: native splash — brand logo on the dark brand background (#16130F).
# Android 12+ handles splashes separately, so the android_12 block mirrors it.
flutter_native_splash:
  color: "#16130F"
  image: design/export/feature-1024x500.png
  android_12:
    color: "#16130F"
    image: design/export/feature-1024x500.png

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/  # <-- Bu satır klasördeki her şeyi içeri alır
    - assets/ml/  # MIS-03 (Phase 6): bundled on-device TFLite object-labeling model
    - design/export/feature-1024x500.png  # BRAND-IN-APP: drawer header banner
    - design/export/icon-1024.png  # BRAND-IN-APP: splash + brand logo source
  fonts:
    # BRAND-IN-APP: genuine Montserrat (weight 700) for the ScanAwake wordmark.
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700