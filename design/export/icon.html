<!DOCTYPE html>
<html lang="tr"><head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#16130F}
  .icon{position:relative;width:100vmin;height:100vmin;background:#16130F}
  .icon svg.frame{position:absolute;inset:0;width:100%;height:100%}
  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    line-height:.84;text-align:center;font-family:Montserrat,sans-serif;font-weight:900;
    text-transform:uppercase;font-size:11.9vmin;letter-spacing:.6vmin}
  .cr{color:#F2EBDB}.red{color:#E83A2E}
</style></head>
<body>
  <div class="icon">
    <svg class="frame" viewBox="0 0 100 100">
      <g fill="none" stroke="#F2EBDB" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M34 14 H21 Q14 14 14 21 V34"/>
        <path d="M66 14 H79 Q86 14 86 21 V34"/>
        <path d="M14 66 V79 Q14 86 21 86 H34"/>
        <path d="M86 66 V79 Q86 86 79 86 H66"/>
      </g>
    </svg>
    <div class="center"><span class="cr">Scan</span><span class="red">Awake</span></div>
  </div>
</body></html>
