# CI for the NoSnooze (uyan) Flutter app.
# Lives in the uyan/ repo (origin github.com/Burak-Cam/NoSnooze). The outer
# AlarmApp/ repo and .planning/ are NOT part of this repo and never trigger CI.
# The repo root IS the Flutter project, so no working-directory is needed.
name: CI
on:
  push:
  pull_request:
jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7 # matches lockfile floor (Phase 7 vibration ^3.2.0 needs Dart ^3.11.0); device-verified toolchain
          cache: true
      - run: flutter pub get
      - run: flutter analyze --fatal-warnings
      - run: flutter test
